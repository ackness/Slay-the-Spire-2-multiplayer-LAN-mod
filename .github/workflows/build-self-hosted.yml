name: Build Self-Hosted

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on:
      - self-hosted
      - windows
      - sts2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Package Windows build
        shell: powershell
        env:
          STS2_ROOT: ${{ vars.STS2_ROOT_WINDOWS }}
          GODOT_BIN: ${{ vars.GODOT_BIN_WINDOWS }}
          DOTNET_BIN: ${{ vars.DOTNET_BIN_WINDOWS }}
        run: |
          $params = @{}
          if ($env:STS2_ROOT) { $params.Sts2Root = $env:STS2_ROOT }
          if ($env:GODOT_BIN) { $params.GodotBin = $env:GODOT_BIN }
          if ($env:DOTNET_BIN) { $params.DotnetBin = $env:DOTNET_BIN }
          & .\scripts\package-sts2-lan-connect-windows.ps1 @params

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: sts2-lan-connect-windows
          path: sts2-lan-connect/release/*-windows.zip
          if-no-files-found: error

  build-macos:
    runs-on:
      - self-hosted
      - macOS
      - sts2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Package macOS build
        shell: bash
        env:
          STS2_ROOT: ${{ vars.STS2_ROOT_MACOS }}
          GODOT_BIN: ${{ vars.GODOT_BIN_MACOS }}
          DOTNET_BIN: ${{ vars.DOTNET_BIN_MACOS }}
        run: |
          chmod +x ./scripts/build-sts2-lan-connect.sh
          chmod +x ./scripts/package-sts2-lan-connect.sh
          ./scripts/package-sts2-lan-connect.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: sts2-lan-connect-macos
          path: sts2-lan-connect/release/*-macos.zip
          if-no-files-found: error
